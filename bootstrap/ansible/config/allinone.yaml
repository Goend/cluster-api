---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
  name: capi-ansible-bootstrap-node
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bootstrap-ansible-manager
  namespace: capi-ansible-bootstrap-node
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bootstrap-ansible-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - events
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
- apiGroups:
  - bootstrap.cluster.x-k8s.io
  resources:
  - ansibleconfigs
  - ansibleconfigs/finalizers
  - ansibleconfigs/status
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - clusters
  - clusters/status
  - machinepools
  - machinepools/status
  - machines
  - machines/status
  - machinesets
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bootstrap-ansible-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bootstrap-ansible-manager-role
subjects:
- kind: ServiceAccount
  name: bootstrap-ansible-manager
  namespace: capi-ansible-bootstrap-node
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bootstrap-ansible-leader-election-role
  namespace: capi-ansible-bootstrap-node
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bootstrap-ansible-leader-election-rolebinding
  namespace: capi-ansible-bootstrap-node
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bootstrap-ansible-leader-election-role
subjects:
- kind: ServiceAccount
  name: bootstrap-ansible-manager
  namespace: capi-ansible-bootstrap-node
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootstrap-ansible-controller-manager
  namespace: capi-ansible-bootstrap-node
  labels:
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - name: manager
        image: hub.easystack.cn/test/bootstrap-ansible:202602111929
        command:
        - /manager
        args:
        - "--leader-elect"
        - "--diagnostics-address=$(CAPI_DIAGNOSTICS_ADDRESS)"
        - "--insecure-diagnostics=$(CAPI_INSECURE_DIAGNOSTICS)"
        env:
        - name: CAPI_DIAGNOSTICS_ADDRESS
          value: ":8443"
        - name: CAPI_INSECURE_DIAGNOSTICS
          value: "false"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        ports:
        - containerPort: 9440
          name: healthz
          protocol: TCP
        - containerPort: 8443
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: healthz
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          runAsGroup: 65532
          runAsUser: 65532
        terminationMessagePolicy: FallbackToLogsOnError
      serviceAccountName: bootstrap-ansible-manager
      terminationGracePeriodSeconds: 10
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
